<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>ClearFrame</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 12px;
      width: 260px;
      margin: 0;
      background: #fff;
      color: #333;
    }
    body.dark {
      background: #1a1a1a;
      color: #eee;
    }
    h1 {
      font-size: 16px;
      margin: 0 0 4px;
    }
    .counter {
      font-size: 12px;
      color: #666;
      margin-bottom: 12px;
    }
    body.dark .counter {
      color: #888;
    }
    .row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 8px 0;
    }
    input[type="checkbox"] {
      width: 20px;
      height: 20px;
      cursor: pointer;
    }
    label {
      cursor: pointer;
      font-size: 14px;
    }
    .section {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #eee;
    }
    body.dark .section {
      border-top-color: #333;
    }
    .section-title {
      font-size: 12px;
      color: #888;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <h1>ClearFrame</h1>
  <div class="counter" id="counter">Loading...</div>
  
  <div class="row">
    <input type="checkbox" id="enabled">
    <label for="enabled">Enable</label>
  </div>

  <div class="section">
    <div class="section-title">Types</div>
    <div id="types-container"></div>
  </div>

  <div class="section">
    <div class="row">
      <input type="checkbox" id="darkMode">
      <label for="darkMode">Dark Mode</label>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
