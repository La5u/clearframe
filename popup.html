<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    :root {
      --bg: #f6f1e8;
      --panel: #fff8ef;
      --ink: #1a1a1a;
      --muted: #6b6b6b;
      --stroke: #c9c1b5;
      --accent: #0f172a;
      --chip-border: #b9afa1;
      --chip-disabled: #9d9486;
      --tab-bg: #efe6da;
      --tab-active: #1a1a1a;
      --tab-active-ink: #fff;
      --shadow: 0 8px 20px rgba(0,0,0,0.08);
    }
    body {
      width: 280px;
      height: 420px;
      font-family: "Avenir Next", "Segoe UI", "Trebuchet MS", sans-serif;
      margin: 0;
      padding: 12px;
      font-size: 12px;
      background: var(--bg);
      color: var(--ink);
      box-sizing: border-box;
    }
    * { box-sizing: border-box; }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 10px;
      border: 1px solid var(--stroke);
      border-radius: 10px;
      background: var(--panel);
      box-shadow: var(--shadow);
      margin-bottom: 10px;
      gap: 8px;
    }
    .toggle { position: relative; width: 34px; height: 18px; cursor: pointer; flex: 0 0 auto; }
    .toggle input { display: none; }
    .toggle .track {
      position: absolute;
      inset: 0;
      background: var(--tab-bg);
      border: 1px solid var(--stroke);
      border-radius: 999px;
    }
    .toggle .track::after {
      content: "";
      position: absolute;
      top: 2px;
      left: 2px;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--ink);
      transition: transform 0.12s ease;
    }
    .toggle input:checked + .track::after { transform: translateX(16px); }
    h3 { margin: 0; font-size: 14px; letter-spacing: 0.3px; }
    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      margin-bottom: 10px;
    }
    .tab-btn {
      font-size: 11px;
      padding: 6px 8px;
      border: 1px solid var(--stroke);
      background: var(--tab-bg);
      color: var(--ink);
      border-radius: 8px;
      cursor: pointer;
    }
    .tab-btn.active {
      background: var(--tab-active);
      color: var(--tab-active-ink);
      border-color: transparent;
    }
    .tab-count {
      margin-left: 4px;
      color: inherit;
      opacity: 0.75;
    }
    .tab-panel {
      display: none;
      height: 320px;
      overflow: auto;
      padding: 10px;
      border: 1px solid var(--stroke);
      border-radius: 12px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }
    .tab-panel.active { display: block; }
    .color-group { margin-bottom: 10px; border-radius: 10px; padding: 6px; border: 1px dashed var(--stroke); }
    .color-group-title { font-size: 10px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; color: var(--muted); margin: 0 0 6px 2px; }
    .type-list { min-height: 20px; padding: 4px; border-radius: 8px; }
    .type-chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 8px;
      margin: 2px;
      border-radius: 999px;
      font-size: 11px;
      cursor: pointer;
      background: transparent;
      border: 1px solid var(--chip-border);
      color: var(--ink);
    }
    .type-chip:active { cursor: grabbing; }
    .type-chip.disabled { opacity: 0.45; color: var(--chip-disabled); }
    .type-chip-label { pointer-events: none; }
    .type-chip.dragging { opacity: 0.5; }
    .drop-zone { border: 2px dashed transparent; }
    .drop-zone.drag-over { border-color: var(--accent); }
    #reset-btn { font-size: 10px; margin-top: 8px; padding: 6px 8px; border-radius: 8px; border: 1px solid var(--stroke); background: transparent; color: var(--ink); }
    #term-list {
      max-height: 180px;
      overflow: auto;
      border: 1px solid var(--stroke);
      padding: 8px;
      border-radius: 10px;
      background: transparent;
    }
    .term-row { display: flex; justify-content: space-between; gap: 8px; padding: 2px 0; }
    .term-count { color: var(--muted); }
  </style>
</head>
<body>
  <div class="header">
    <h3>ClearFrame</h3>
    <label class="toggle" aria-label="Enable ClearFrame">
      <input type="checkbox" id="enabled">
      <span class="track" aria-hidden="true"></span>
    </label>
  </div>
  <div class="tabs">
    <button class="tab-btn active" data-tab="settings">Settings</button>
    <button class="tab-btn" data-tab="terms">Detected <span id="detected-count" class="tab-count"></span></button>
  </div>
  <div class="tab-panel active" data-panel="settings">
  <div id="color-groups"></div>
  <button id="reset-btn">Reset Colors</button>
  </div>
  <div class="tab-panel" data-panel="terms">
    <div id="term-list">Loading...</div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
