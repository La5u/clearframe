<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    :root {
      --bg: #ffffff;
      --panel: #ffffff;
      --ink: #111111;
      --muted: #666666;
      --stroke: #e5e5e5;
      --accent: #111111;
      --chip-border: #d8d8d8;
      --chip-disabled: #8d8d8d;
    }
    * { box-sizing: border-box; }
    body {
      width: 284px;
      min-height: 320px;
      max-height: 480px;
      margin: 0;
      padding: 12px;
      font-family: "Segoe UI", sans-serif;
      font-size: 12px;
      background: var(--bg);
      color: var(--ink);
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 0 0 10px;
      margin-bottom: 10px;
      border-bottom: 1px solid var(--stroke);
    }
    h3 {
      margin: 0;
      font-size: 14px;
      font-weight: 600;
    }
    .toggle {
      position: relative;
      width: 34px;
      height: 18px;
      cursor: pointer;
      flex: 0 0 auto;
    }
    .toggle input { display: none; }
    .toggle .track {
      position: absolute;
      inset: 0;
      border: 1px solid var(--stroke);
      border-radius: 999px;
      background: #f3f3f3;
    }
    .toggle .track::after {
      content: "";
      position: absolute;
      top: 2px;
      left: 2px;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--ink);
      transition: transform 0.12s ease;
    }
    .toggle input:checked + .track::after {
      transform: translateX(16px);
    }
    .count-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 0 2px 8px;
      color: var(--muted);
      font-size: 11px;
    }
    .count-value {
      color: var(--ink);
      font-weight: 700;
    }
    .panel {
      max-height: 345px;
      overflow: auto;
      padding: 0;
      background: var(--panel);
    }
    .setting-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 10px 0;
      margin-bottom: 8px;
      border-bottom: 1px solid var(--stroke);
    }
    .setting-copy {
      min-width: 0;
      flex: 1 1 auto;
    }
    .setting-title {
      margin: 0 0 2px;
      font-size: 11px;
      font-weight: 700;
    }
    .setting-help {
      margin: 0;
      color: var(--muted);
      line-height: 1.35;
    }
    .section-title {
      margin: 10px 0 6px;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--muted);
    }
    .color-group {
      margin-bottom: 8px;
      padding: 6px;
      border: 1px solid var(--stroke);
      border-radius: 8px;
    }
    .color-group-title {
      margin: 0 0 6px 2px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--muted);
    }
    .type-list {
      min-height: 20px;
      padding: 4px;
      border-radius: 8px;
    }
    .type-chip {
      display: inline-flex;
      align-items: center;
      padding: 4px 8px;
      margin: 2px;
      border: 1px solid var(--chip-border);
      border-radius: 999px;
      color: var(--ink);
      font-size: 11px;
      cursor: pointer;
    }
    .type-chip.disabled {
      opacity: 0.45;
      color: var(--chip-disabled);
    }
    .type-chip.dragging {
      opacity: 0.5;
    }
    .type-chip-label {
      pointer-events: none;
    }
    .drop-zone {
      border: 2px dashed transparent;
    }
    .drop-zone.drag-over {
      border-color: var(--accent);
    }
    #reset-btn {
      margin-top: 8px;
      padding: 6px 8px;
      border: 1px solid var(--stroke);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      font-size: 10px;
    }
    .muted {
      color: var(--muted);
      font-size: 11px;
    }
    .detected-section {
      margin-top: 10px;
    }
    .term-list {
      max-height: 140px;
      overflow: auto;
      border: 1px solid var(--stroke);
      padding: 8px;
      border-radius: 8px;
      background: #fff;
    }
    .term-row {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      padding: 2px 0;
    }
    .term-count {
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div class="header">
    <h3>ClearFrame</h3>
    <label class="toggle" aria-label="Enable ClearFrame">
      <input type="checkbox" id="enabled">
      <span class="track" aria-hidden="true"></span>
    </label>
  </div>
  <div class="count-row">
    <span>Detected on page</span>
    <span class="count-value" id="detected-count">(0)</span>
  </div>
  <div class="panel">
    <div class="setting-row">
      <div class="setting-copy">
        <div class="setting-title">Replace mode</div>
        <p class="setting-help">Replace terms with neutral alternatives when available. Terms without replacements stay highlighted.</p>
      </div>
      <label class="toggle" aria-label="Replace matched terms with neutral alternatives">
        <input type="checkbox" id="replace-terms">
        <span class="track" aria-hidden="true"></span>
      </label>
    </div>
    <div class="section-title">Types</div>
    <div id="color-groups"></div>
    <button id="reset-btn" type="button">Reset Colors</button>
    <div class="detected-section">
      <div class="section-title">Detected terms</div>
      <div id="term-list" class="term-list">Loading...</div>
    </div>
    <p class="muted">Tap a type to enable or disable it. Drag a type to a different color group to change its color.</p>
  </div>
  <script src="popup.js"></script>
</body>
</html>
